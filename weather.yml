name: Windsor Weather Agent

on:
  schedule:
    # Runs at 8:00 AM UK time (UTC+1 BST = 07:00 UTC, UTC+0 GMT = 08:00 UTC)
    # We use 07:00 UTC to account for BST (British Summer Time)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allows you to run manually from GitHub UI

jobs:
  weather:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed to commit history.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather agent
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python weather_agent.py

      - name: Save updated history to repo
        run: |
          git config user.name "Weather Bot"
          git config user.email "weatherbot@noreply.github.com"
          git add weather_history.json
          git diff --staged --quiet || git commit -m "📊 Update weather history $(date +'%Y-%m-%d')"
          git push
