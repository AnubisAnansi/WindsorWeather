name: Windsor Weather Agent

on:
  schedule:
    # 8:00 AM BST (UTC+1) = 07:00 UTC (summer)
    # 8:00 AM GMT (UTC+0) = 08:00 UTC (winter)
    # We schedule at 07:00 UTC to target 8am BST in summer
    # In winter (GMT) this will run at 7am — acceptable tradeoff
    - cron: '0 7 * * *'
  workflow_dispatch: # Allows manual run from GitHub Actions tab

jobs:
  weather:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TZ: Europe/London  # Sets timezone for all steps

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather agent
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          TZ: Europe/London
        run: python weather_agent.py

      - name: Save updated history to repo
        run: |
          git config user.name "Weather Bot"
          git config user.email "weatherbot@noreply.github.com"
          git add weather_history.json
          git diff --staged --quiet || git commit -m "📊 Update weather history $(date +'%Y-%m-%d')"
          git push
